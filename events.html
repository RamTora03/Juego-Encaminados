		function renderEvents(filter = "all") {
			const container = document.getElementById("events-container");
			container.innerHTML = "";

			const filtered = filter === "all" ? events : events.filter(e => e.estacion === filter);

			filtered.forEach(event => {
				const card = document.createElement("div");
				card.className = "event-card";
				card.innerHTML = `
					<div class="event-header">
						<h4>${event.titulo}</h4>
						<div class="event-id">${event.id}</div>
					</div>
					<div class="options-grid">
						<div class="option option-a">

							<div class="effect">

								<span class="stat ${event.funcionamientoA < 0 ? 'negative' : 'positive'}">Función: ${event.funcionamientoA > 0 ? '+' : ''}${event.funcionamientoA}</span>
							</div>
						</div>
						<div class="option option-b">

			renderEvents(station);
		}
